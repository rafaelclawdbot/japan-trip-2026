<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip 2026 - Roteiro Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .tabs-container {
            display: flex;
            border-bottom: 2px solid #ddd;
            background: #f8f9fa;
            overflow-x: auto;
        }

        .tab-button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            color: #666;
            white-space: nowrap;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            background: #efefef;
            color: #333;
        }

        .tab-button.active {
            color: #f5576c;
            border-bottom-color: #f5576c;
        }
        
        .content {
            padding: 40px;
            max-height: 65vh;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Markdown Styling */
        .tab-content h1 {
            font-size: 2em;
            margin: 20px 0 15px 0;
            color: #333;
        }

        .tab-content h2 {
            font-size: 1.5em;
            margin: 25px 0 12px 0;
            color: #f5576c;
            border-left: 4px solid #f5576c;
            padding-left: 12px;
        }

        .tab-content h3 {
            font-size: 1.2em;
            margin: 18px 0 10px 0;
            color: #555;
        }

        .tab-content p {
            line-height: 1.7;
            margin-bottom: 12px;
            color: #555;
        }

        .tab-content strong {
            color: #333;
            font-weight: 600;
        }

        .tab-content a {
            color: #f5576c;
            text-decoration: none;
        }

        .tab-content a:hover {
            text-decoration: underline;
        }

        .tab-content ul, .tab-content ol {
            margin: 15px 0 15px 30px;
            line-height: 1.8;
        }

        .tab-content li {
            margin-bottom: 8px;
            color: #555;
        }

        .tab-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.95em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tab-content th {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .tab-content td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .tab-content tr:hover {
            background: #f8f9fa;
        }

        .tab-content blockquote {
            border-left: 4px solid #f5576c;
            padding: 12px 16px;
            margin: 15px 0;
            background: #fff5f7;
            color: #555;
        }

        .tab-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }

        .tab-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 15px 0;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .tab-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: #ffe6e6;
            color: #c00;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }

        footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .tab-button {
                padding: 12px 15px;
                font-size: 0.85em;
            }

            .content {
                padding: 20px;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇯🇵 JAPAN TRIP 2026</h1>
            <p>15 de Março - 11 de Abril de 2026 (26 dias)</p>
            <p><strong>Rafael & Ariana</strong></p>
        </header>

        <div class="tabs-container">
            <button class="tab-button active" onclick="switchTab(0)">🗼 Tokyo Parte 1</button>
            <button class="tab-button" onclick="switchTab(1)">❄️ Hokkaido</button>
            <button class="tab-button" onclick="switchTab(2)">🏯 Osaka</button>
            <button class="tab-button" onclick="switchTab(3)">🏮 Kyoto</button>
            <button class="tab-button" onclick="switchTab(4)">🗼 Tokyo Parte 2</button>
            <button class="tab-button" onclick="switchTab(5)">✨ Extra</button>
        </div>

        <div class="content">
            <div id="tab-0" class="tab-content active"><div class="loading">Carregando Tokyo Parte 1...</div></div>
            <div id="tab-1" class="tab-content"><div class="loading">Carregando Hokkaido...</div></div>
            <div id="tab-2" class="tab-content"><div class="loading">Carregando Osaka...</div></div>
            <div id="tab-3" class="tab-content"><div class="loading">Carregando Kyoto...</div></div>
            <div id="tab-4" class="tab-content"><div class="loading">Carregando Tokyo Parte 2...</div></div>
            <div id="tab-5" class="tab-content"><div class="loading">Carregando Extra...</div></div>
        </div>

        <footer>
            <p>✈️ Criado com amor para nossa aventura japonesa ❤️</p>
            <p style="font-size: 0.85em; margin-top: 5px;">Rafael & Ariana - 2026</p>
        </footer>
    </div>

    <script>
        // URLs dos arquivos markdown no repositório source
        const files = [
            {
                name: '01-tokyo-parte1.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/01-tokyo-parte1.md'
            },
            {
                name: '02-hokkaido-sapporo.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/02-hokkaido-sapporo.md'
            },
            {
                name: '03-osaka.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/03-osaka.md'
            },
            {
                name: '04-kyoto.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/04-kyoto.md'
            },
            {
                name: '05-tokyo-parte2.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/05-tokyo-parte2.md'
            },
            {
                name: '06-tokyo-extra.md',
                url: 'https://raw.githubusercontent.com/rafaelcarraska/trip-japan-26/main/06-tokyo-extra.md'
            }
        ];

        let currentTab = 0;

        // Carregar conteúdo dos arquivos markdown
        async function loadMarkdownFiles() {
            for (let i = 0; i < files.length; i++) {
                try {
                    const response = await fetch(files[i].url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const markdown = await response.text();
                    const html = marked.parse(markdown);
                    document.getElementById(`tab-${i}`).innerHTML = html;
                } catch (error) {
                    document.getElementById(`tab-${i}`).innerHTML = 
                        `<div class="error">❌ Erro ao carregar ${files[i].name}: ${error.message}</div>`;
                }
            }
        }

        function switchTab(index) {
            // Remover active de todos os botões
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Remover active de todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Adicionar active ao botão clicado
            document.querySelectorAll('.tab-button')[index].classList.add('active');

            // Adicionar active ao conteúdo correspondente
            document.getElementById(`tab-${index}`).classList.add('active');

            // Scroll para o topo do conteúdo
            document.querySelector('.content').scrollTop = 0;

            currentTab = index;
        }

        // Carregar conteúdo ao iniciar
        loadMarkdownFiles();

        // Teclado para navegação
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentTab > 0) {
                switchTab(currentTab - 1);
            } else if (e.key === 'ArrowRight' && currentTab < files.length - 1) {
                switchTab(currentTab + 1);
            }
        });
    </script>
</body>
</html>
